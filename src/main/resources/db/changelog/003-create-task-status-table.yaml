databaseChangeLog:
  - changeSet:
      id: 002-create-task-status
      author: student
      changes:
        - createTable:
            tableName: task_status
            columns:
              - column:
                  name: id
                  type: BIGINT
                  autoIncrement: true
                  constraints:
                    primaryKey: true
              - column:
                  name: name
                  type: VARCHAR(50)
                  constraints:
                    nullable: false
                    unique: true

        - insert:
            tableName: task_status
            columns:
              - column: { name: name, value: NEW }
        - insert:
            tableName: task_status
            columns:
              - column: { name: name, value: IN_PROGRESS }
        - insert:
            tableName: task_status
            columns:
              - column: { name: name, value: DONE }
        - insert:
            tableName: task_status
            columns:
              - column: { name: name, value: OVERDUE }
