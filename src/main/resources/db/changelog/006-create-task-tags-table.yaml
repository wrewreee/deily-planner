databaseChangeLog:
  - changeSet:
      id: 006-create-task-tags
      author: student
      changes:
        - createTable:
            tableName: task_tags
            columns:
              - column:
                  name: task_id
                  type: UUID
                  defaultValueComputed: RANDOM_UUID()
                  constraints:
                    nullable: false

              - column:
                  name: tag_id
                  type: UUID
                  defaultValueComputed: RANDOM_UUID()
                  constraints:
                    nullable: false

        - addPrimaryKey:
            tableName: task_tags
            columnNames: task_id, tag_id
            constraintName: pk_task_tags

        - addForeignKeyConstraint:
            baseTableName: task_tags
            baseColumnNames: task_id
            referencedTableName: tasks
            referencedColumnNames: id
            constraintName: fk_task_tags_task

        - addForeignKeyConstraint:
            baseTableName: task_tags
            baseColumnNames: tag_id
            referencedTableName: tags
            referencedColumnNames: id
            constraintName: fk_task_tags_tag
